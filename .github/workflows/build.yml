name: Build and Release Electron App

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Install Dependencies
        run: npm install

      # Install required dependencies for Linux builds with better distro detection
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "Detecting Linux distribution..."
          if [ -f /etc/os-release ]; then
            . /etc/os-release
            echo "Found distribution: $NAME"
            
            # Ubuntu/Debian based systems
            if [[ "$ID" == "ubuntu" ]] || [[ "$ID" == "debian" ]] || [[ "$ID_LIKE" == *"debian"* ]]; then
              echo "Installing dependencies for Debian/Ubuntu based system"
              sudo apt-get update
              sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6 xvfb
              # Try to install libasound2 but don't fail if not available
              sudo apt-get install -y libasound2 || echo "libasound2 not available, continuing anyway"
            
            # Arch based systems
            elif [[ "$ID" == "arch" ]] || [[ "$ID_LIKE" == *"arch"* ]]; then
              echo "Installing dependencies for Arch based system"
              sudo pacman -Syu --noconfirm
              sudo pacman -S --noconfirm gtk3 libnotify nss libxss libxtst xorg-server-xvfb alsa-lib
            
            # Red Hat based systems (RHEL, CentOS, Fedora)
            elif [[ "$ID" == "rhel" ]] || [[ "$ID" == "centos" ]] || [[ "$ID" == "fedora" ]] || [[ "$ID_LIKE" == *"rhel"* ]]; then
              echo "Installing dependencies for Red Hat based system"
              sudo dnf install -y gtk3-devel libnotify-devel nss-devel libXScrnSaver-devel libXtst-devel alsa-lib-devel
            
            # Generic fallback
            else
              echo "Distribution not specifically supported, installing common dependencies"
              # Try apt-get first
              which apt-get && {
                sudo apt-get update
                sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6 xvfb
              } || echo "apt-get not available"
            fi
          else
            echo "Could not detect Linux distribution, attempting Ubuntu/Debian packages"
            sudo apt-get update || true
            sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6 xvfb || true
          fi
          
          # Verify installation state
          echo "Installation completed, listing installed packages..."
          if which dpkg &>/dev/null; then
            dpkg -l | grep -E 'libgtk|libnotify|libnss|libxss|libxtst|xvfb'
          elif which pacman &>/dev/null; then
            pacman -Q | grep -E 'gtk|notify|nss|xss|xtst|xvfb'
          elif which rpm &>/dev/null; then
            rpm -qa | grep -E 'gtk|notify|nss|XScrn|Xtst'
          fi

      - name: Build Electron App
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      # Rename artifacts based on OS
      - name: Rename Windows artifacts
        if: matrix.os == 'windows-latest'
        run: |
          cd dist
          ls -la
          # Keep this command for logging purposes

      - name: Rename Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          ls -la
          # Keep this command for logging purposes

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.exe
            dist/*.appimage
            dist/*.AppImage
            dist/*.zip
            dist/*.dmg
            dist/*.deb
            dist/*.rpm
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
