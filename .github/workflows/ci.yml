name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Verify launcher icon configuration
        run: flutter pub run flutter_launcher_icons -f tool/launcher_icons/android.yaml

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons -f tool/launcher_icons/android.yaml

      - name: Build Android APK
        run: flutter build apk --debug

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev cmake clang pkg-config libfuse2 zip

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons -f tool/launcher_icons/android.yaml

      - name: Build Linux
        run: flutter build linux --debug

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        shell: pwsh
        run: flutter pub run flutter_launcher_icons -f tool/launcher_icons/windows.yaml

      - name: Build Windows
        run: flutter build windows --debug

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate platform files
        run: flutter create --platforms=macos .

      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons -f tool/launcher_icons/macos.yaml

      - name: Build macOS
        run: flutter build macos --debug

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate platform files
        run: flutter create --platforms=ios .

      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons -f tool/launcher_icons/ios.yaml

      - name: Build iOS without codesign
        run: flutter build ios --debug --no-codesign
