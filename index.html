<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>岛风酱我是你的粉丝啊</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>图片浏览器</h1>
      <div class="header-controls">
        <button id="theme-toggle" class="theme-toggle" title="切换夜间模式">
          <i class="bi bi-moon-fill"></i>
        </button>
      </div>
    </header>
    
    <div class="main-content">
      <div class="sidebar">
        <div class="control-panel">
          <h3>图片设置</h3>
          
          <div class="form-group">
            <label for="image-type">选择图像类型:</label>
            <select id="image-type">
              <option value="top" selected>精选图像</option>
              <option value="random">随机全部图像</option>
              <option value="iw233">随机无色图像</option>
              <option value="yin">银发</option>
              <option value="cat">兽耳</option>
              <option value="xing">星空</option>
              <option value="mp">竖屏</option>
              <option value="pc">横屏</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="image-count">图像数量:</label>
            <input type="number" id="image-count" min="1" max="10" value="1">
          </div>
          
          <div class="form-group">
            <label for="save-format">保存格式:</label>
            <select id="save-format">
              <option value="original" selected>原始格式</option>
              <option value="jpg">JPG</option>
              <option value="png">PNG</option>
            </select>
          </div>
          
          <div class="checkbox-container">
            <input type="checkbox" id="default-path" checked>
            <label for="default-path">使用默认文件路径</label>
          </div>
          
          <button id="fetch-button" class="btn">抓取图像</button>
          
          <div class="actions-panel" id="image-actions">
            <button id="save-button" class="btn action-btn" disabled>保存图像</button>
            <button id="copy-button" class="btn action-btn" disabled>复制到剪贴板</button>
            <button id="open-folder-button" class="btn action-btn" disabled>打开文件夹</button>
          </div>
        </div>
        
        <!-- 图像信息面板 -->
        <div class="image-info-panel">
          <h3>图像信息</h3>
          <div id="image-info-content" class="image-info-content">
            <p>尚未加载图像</p>
          </div>
        </div>
        
        <div class="image-gallery">
          <h3>图片库</h3>
          <div class="select-controls">
            <div class="select-checkbox-container">
              <input type="checkbox" id="select-all-checkbox">
              <label for="select-all-checkbox">全选</label>
            </div>
            <button id="batch-save-button" class="batch-action-btn" disabled>批量保存</button>
          </div>
          <div id="thumbnails-container" class="thumbnails-container">
            <!-- 缩略图将在这里动态添加 -->
          </div>
        </div>
      </div>
      
      <div class="content">
        <!-- 图像工具栏 -->
        <div class="image-toolbar">
          <div class="zoom-controls">
            <button id="zoom-out-btn" class="toolbar-btn" disabled title="缩小"><i class="bi bi-zoom-out"></i></button>
            <span id="zoom-level">100%</span>
            <button id="zoom-in-btn" class="toolbar-btn" disabled title="放大"><i class="bi bi-zoom-in"></i></button>
            <button id="zoom-reset-btn" class="toolbar-btn" disabled title="实际大小"><i class="bi bi-aspect-ratio"></i></button>
            <button id="zoom-fit-btn" class="toolbar-btn" disabled title="适应窗口"><i class="bi bi-fullscreen"></i></button>
          </div>
          <div class="rotate-controls">
            <button id="rotate-left-btn" class="toolbar-btn" disabled title="向左旋转"><i class="bi bi-arrow-counterclockwise"></i></button>
            <button id="rotate-right-btn" class="toolbar-btn" disabled title="向右旋转"><i class="bi bi-arrow-clockwise"></i></button>
          </div>
        </div>
        
        <!-- 图像显示区域 -->
        <div id="image-container" class="image-container">
          <div id="image-display" class="image-display">
            <p>没有图像</p>
          </div>
          <div id="nav-hint-left" class="nav-hint left">
            <i class="bi bi-arrow-left"></i> 上一张
          </div>
          <div id="nav-hint-right" class="nav-hint right">
            下一张 <i class="bi bi-arrow-right"></i>
          </div>
          <div id="image-status" class="image-status"></div>
        </div>
      </div>
    </div>
    
    <footer>
      <p>数据来源: <a href="https://api.iw233.cn" target="_blank">api.iw233.cn</a></p>
      <div class="app-version">v0.1.0</div>
    </footer>
  </div>
  
  <script src="renderer.js"></script>
</body>
</html>
